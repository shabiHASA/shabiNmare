<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♡ 샤비메어 타로타로 ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --p0: #fff5f9;
  --p1: #ffe4ef;
  --p2: #ffb8d4;
  --p3: #f48fb1;
  --p4: #e06090;
  --p5: #c0426e;
  --dark: #1a0d12;
  --dark2: #2d1520;
  --dark3: #3d2030;
  --mid: #7a3a55;
  --soft: #c47090;
  --card-w: 130px;
  --card-h: 210px;
}

body {
  background: var(--dark);
  color: var(--p1);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
.cursor {
  position: fixed;
  width: 18px; height: 18px;
  background: var(--p3);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
  transition: transform 0.08s, background 0.2s, width 0.2s, height 0.2s;
  mix-blend-mode: screen;
}
.cursor-ring {
  position: fixed;
  width: 38px; height: 38px;
  border: 1.5px solid var(--p3);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99998;
  transform: translate(-50%, -50%);
  transition: transform 0.18s ease, border-color 0.2s;
  opacity: 0.5;
}

/* ── BG EFFECTS ── */
.bg-layer {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 10%, rgba(244,143,177,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 80%, rgba(192,66,110,0.1) 0%, transparent 60%),
    var(--dark);
  z-index: 0;
  pointer-events: none;
}

/* ── PARTICLES layer (floating symbols) ── */
.particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
.particle {
  position: absolute;
  animation: floatParticle linear infinite;
  opacity: 0;
  user-select: none;
}
@keyframes floatParticle {
  0%   { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 0.6; }
  100% { transform: translateY(-10vh) translateX(var(--drift)) rotate(360deg); opacity: 0; }
}

/* ── STARS layer (fixed twinkle) ── */
.stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: starTwinkle ease-in-out infinite;
  opacity: 0;
}
/* cross-shaped shimmer via box-shadow */
.star.cross::before, .star.cross::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 2px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
}
.star.cross::before { width: 1px; height: 300%; }
.star.cross::after  { width: 300%; height: 1px; }

@keyframes starTwinkle {
  0%,100% { opacity: 0;   transform: scale(0.3); }
  20%     { opacity: 0;   transform: scale(0.3); }
  40%     { opacity: 0.95; transform: scale(1.2); }
  55%     { opacity: 0.4;  transform: scale(0.7); }
  70%     { opacity: 0.85; transform: scale(1.0); }
  85%     { opacity: 0.2;  transform: scale(0.5); }
}

/* ── MAIN LAYOUT ── */
main {
  position: relative;
  z-index: 10;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ── HEADER ── */
header {
  text-align: center;
  padding: 56px 0 48px;
  position: relative;
}
.header-deco {
  font-size: 13px;
  color: var(--p3);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 16px;
  opacity: 0.8;
  animation: fadeUp 0.8s ease both;
}
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(42px, 7vw, 72px);
  font-style: italic;
  line-height: 1.05;
  color: var(--p1);
  margin-bottom: 14px;
  animation: fadeUp 0.8s 0.1s ease both;
}
h1 em {
  color: var(--p3);
  font-style: italic;
}
.header-sub {
  font-size: 14px;
  color: var(--soft);
  font-weight: 300;
  line-height: 1.8;
  animation: fadeUp 0.8s 0.2s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ornament line */
.ornament {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 28px auto;
  max-width: 300px;
  animation: fadeUp 0.8s 0.3s ease both;
}
.ornament-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--p3), transparent); }
.ornament-icon { color: var(--p3); font-size: 18px; }

/* ── QUESTION INPUT ── */
.question-section {
  margin-bottom: 36px;
  animation: fadeUp 0.8s 0.4s ease both;
}
.question-label {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--soft);
  margin-bottom: 12px;
}
.question-box {
  position: relative;
}
.question-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(244,143,177,0.2);
  border-radius: 20px;
  padding: 18px 60px 18px 24px;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 16px;
  color: var(--p1);
  outline: none;
  transition: border-color 0.3s, background 0.3s;
  resize: none;
  line-height: 1.6;
}
.question-input::placeholder { color: rgba(196,112,144,0.5); }
.question-input:focus {
  border-color: rgba(244,143,177,0.5);
  background: rgba(255,255,255,0.06);
}

/* ── SPREAD SELECTOR ── */
.spread-section {
  margin-bottom: 36px;
  animation: fadeUp 0.8s 0.5s ease both;
}
.spread-label {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--soft);
  margin-bottom: 14px;
}
.spread-options {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.spread-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(244,143,177,0.2);
  border-radius: 100px;
  padding: 10px 22px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--soft);
  cursor: pointer;
  transition: all 0.2s;
}
.spread-btn:hover {
  border-color: var(--p3);
  color: var(--p2);
  background: rgba(244,143,177,0.08);
}
.spread-btn.active {
  background: rgba(244,143,177,0.15);
  border-color: var(--p3);
  color: var(--p2);
}

/* ── DRAW BUTTON ── */
.draw-section {
  text-align: center;
  margin-bottom: 52px;
  animation: fadeUp 0.8s 0.6s ease both;
}
.draw-btn {
  position: relative;
  background: linear-gradient(135deg, var(--p4) 0%, var(--p5) 100%);
  color: white;
  border: none;
  border-radius: 100px;
  padding: 18px 52px;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 18px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 40px rgba(224,96,144,0.3);
  overflow: hidden;
}
.draw-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  border-radius: inherit;
}
.draw-btn:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow: 0 14px 50px rgba(224,96,144,0.4);
}
.draw-btn:active:not(:disabled) { transform: translateY(0); }
.draw-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.draw-btn .btn-sparkle { margin-right: 8px; }

/* ── CARDS AREA ── */
.cards-area {
  margin-bottom: 48px;
  min-height: 240px;
}

.cards-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.position-labels {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.pos-label {
  width: var(--card-w);
  text-align: center;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--soft);
  opacity: 0;
  transition: opacity 0.5s;
}
.pos-label.visible { opacity: 1; }

/* ── TAROT CARD ── */
.tarot-card {
  width: var(--card-w);
  height: var(--card-h);
  position: relative;
  perspective: 800px;
  cursor: pointer;
  flex-shrink: 0;
}
.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.7s cubic-bezier(0.4,0,0.2,1);
}
.tarot-card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

/* card back */
.card-back {
  background: linear-gradient(160deg, var(--dark2) 0%, var(--dark3) 100%);
  border: 1px solid rgba(244,143,177,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.card-back::before {
  content: '';
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(244,143,177,0.12);
  border-radius: 10px;
}
.card-back-pattern {
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(45deg, rgba(244,143,177,0.03) 0px, rgba(244,143,177,0.03) 1px, transparent 1px, transparent 8px),
    repeating-linear-gradient(-45deg, rgba(244,143,177,0.03) 0px, rgba(244,143,177,0.03) 1px, transparent 1px, transparent 8px);
  border-radius: 16px;
}
.card-back-icon {
  font-size: 32px;
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 0 12px rgba(244,143,177,0.4));
  animation: pulse-glow 2.5s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(244,143,177,0.3)); transform: scale(1); }
  50%       { filter: drop-shadow(0 0 18px rgba(244,143,177,0.6)); transform: scale(1.08); }
}

/* card front */
.card-front {
  transform: rotateY(180deg);
  background: linear-gradient(160deg, #2a1020 0%, var(--dark2) 100%);
  border: 1px solid rgba(244,143,177,0.3);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 14px 10px;
  gap: 8px;
  box-shadow: 0 0 30px rgba(244,143,177,0.1) inset;
}
.card-front::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid rgba(244,143,177,0.1);
  border-radius: 11px;
  pointer-events: none;
}
.card-emoji {
  font-size: 38px;
  filter: drop-shadow(0 0 10px rgba(244,143,177,0.5));
  line-height: 1;
}
.card-number {
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--p3);
  text-transform: uppercase;
  opacity: 0.7;
}
.card-name {
  font-family: 'Playfair Display', serif;
  font-size: 11px;
  color: var(--p1);
  text-align: center;
  line-height: 1.4;
}
.card-reversed {
  font-size: 8px;
  color: var(--p4);
  letter-spacing: 0.5px;
}

/* card appear animation */
.tarot-card {
  opacity: 0;
  transform: translateY(30px);
  animation: none;
}
.tarot-card.appear {
  animation: cardAppear 0.5s ease both;
}
@keyframes cardAppear {
  from { opacity: 0; transform: translateY(30px) scale(0.92); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.tarot-card:hover .card-back {
  box-shadow: 0 0 24px rgba(244,143,177,0.15);
}

/* ── READING OUTPUT ── */
.reading-section {
  animation: fadeUp 0.6s ease both;
}

.reading-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(244,143,177,0.12);
  border-radius: 24px;
  padding: 36px 40px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.reading-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(244,143,177,0.4), transparent);
}

.reading-card-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.rc-icon { font-size: 16px; }
.rc-pos {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--p3);
}
.rc-name {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--p1);
  margin-bottom: 16px;
  line-height: 1.3;
}
.rc-text {
  font-size: 14.5px;
  color: rgba(255,220,235,0.75);
  line-height: 1.9;
  font-weight: 300;
}
.rc-text.loading {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--soft);
  font-style: italic;
}

/* overall reading */
.overall-reading {
  background: linear-gradient(135deg, rgba(244,143,177,0.08) 0%, rgba(192,66,110,0.06) 100%);
  border: 1px solid rgba(244,143,177,0.2);
  border-radius: 24px;
  padding: 36px 40px;
  position: relative;
  overflow: hidden;
  margin-top: 8px;
}
.overall-reading::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--p3), transparent);
}
.overall-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 20px;
  color: var(--p2);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.overall-text {
  font-size: 14.5px;
  color: rgba(255,220,235,0.8);
  line-height: 1.9;
  font-weight: 300;
}

/* ── LOADING DOTS ── */
.dots { display: inline-flex; gap: 5px; }
.dot {
  width: 5px; height: 5px;
  background: var(--p3);
  border-radius: 50%;
  animation: dotBounce 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
  40% { transform: scale(1.2); opacity: 1; }
}

/* ── RESET BTN ── */
.reset-btn {
  display: block;
  margin: 40px auto 0;
  background: transparent;
  border: 1px solid rgba(244,143,177,0.3);
  border-radius: 100px;
  padding: 12px 32px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--soft);
  cursor: pointer;
  transition: all 0.2s;
}
.reset-btn:hover {
  border-color: var(--p3);
  color: var(--p2);
  background: rgba(244,143,177,0.06);
}

/* hint text */
.click-hint {
  text-align: center;
  font-size: 12px;
  color: var(--soft);
  opacity: 0.6;
  margin-top: 14px;
  font-style: italic;
  letter-spacing: 0.5px;
  transition: opacity 0.3s;
}

/* footer */
.site-footer {
  text-align: center;
  padding: 40px 0 20px;
  font-size: 12px;
  color: rgba(196,112,144,0.35);
  letter-spacing: 0.5px;
  position: relative;
  z-index: 10;
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="bg-layer"></div>
<div class="particles" id="particles"></div>
<div class="stars" id="stars"></div>

<main>
  <header>
    <div class="header-deco">✦ mystic readings ✦</div>
    <h1>샤비메어 <em>타로타로</em></h1>
    <p class="header-sub">카드를 뽑아 당신만의 이야기를 읽어드릴게요</p>
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-icon">🎀</div>
      <div class="ornament-line"></div>
    </div>
  </header>

  <!-- QUESTION -->
  <div class="question-section">
    <div class="question-label">✦ 오늘의 질문</div>
    <div class="question-box">
      <textarea class="question-input" id="questionInput" rows="2"
        placeholder="마음속 질문을 적어주세요… (예: 이 관계는 어디로 향하고 있을까요?)"></textarea>
    </div>
  </div>

  <!-- SPREAD -->
  <div class="spread-section">
    <div class="spread-label">✦ 스프레드 선택</div>
    <div class="spread-options">
      <button class="spread-btn active" data-spread="1" onclick="selectSpread(this)">카드 1장 · 오늘의 메시지</button>
      <button class="spread-btn" data-spread="3" onclick="selectSpread(this)">3장 · 과거 현재 미래</button>
      <button class="spread-btn" data-spread="5" onclick="selectSpread(this)">5장 · 켈틱 크로스</button>
    </div>
  </div>

  <!-- DRAW -->
  <div class="draw-section">
    <button class="draw-btn" id="drawBtn" onclick="drawCards()">
      <span class="btn-sparkle">✨</span> 카드 뽑기
    </button>
  </div>

  <!-- CARDS -->
  <div class="cards-area" id="cardsArea"></div>
  <p class="click-hint" id="clickHint" style="display:none">카드를 클릭하면 뒤집어요 ♡</p>

  <!-- READING -->
  <div id="readingArea"></div>

  <button class="reset-btn" id="resetBtn" style="display:none" onclick="resetAll()">↩ 다시 뽑기</button>
</main>

<footer class="site-footer">♡ shabi Nmare tarot tarot · 재미로만 봐주세요 ♡</footer>

<script>
// ── CURSOR ──
const cursor = document.getElementById('cursor');
const cursorRing = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function animCursor() {
  cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
  rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
  cursorRing.style.left = rx + 'px'; cursorRing.style.top = ry + 'px';
  requestAnimationFrame(animCursor);
})();

// ── PARTICLES (floating symbols) ──
const pContainer = document.getElementById('particles');
const pSymbols = ['♡','✦','✿','★','·','♡','✦'];
for (let i = 0; i < 28; i++) {
  const p = document.createElement('span');
  p.className = 'particle';
  const size = 8 + Math.random() * 10;
  p.style.cssText = `
    left:${Math.random()*100}vw;
    font-size:${size}px;
    color:${['rgba(244,143,177,0.35)','rgba(224,96,144,0.25)','rgba(255,255,255,0.15)'][Math.floor(Math.random()*3)]};
    animation-duration:${12+Math.random()*16}s;
    animation-delay:${Math.random()*14}s;
    --drift:${(Math.random()-0.5)*120}px;
  `;
  p.textContent = pSymbols[Math.floor(Math.random()*pSymbols.length)];
  pContainer.appendChild(p);
}

// ── STARS (twinkling white dots) ──
const sContainer = document.getElementById('stars');
for (let i = 0; i < 90; i++) {
  const s = document.createElement('div');
  const isCross = Math.random() > 0.65;
  s.className = 'star' + (isCross ? ' cross' : '');
  const size = isCross ? (2 + Math.random() * 2) : (1 + Math.random() * 2.5);
  const dur  = 2.5 + Math.random() * 4.5;
  const delay = Math.random() * 8;
  s.style.cssText = `
    left:${Math.random()*100}vw;
    top:${Math.random()*100}vh;
    width:${size}px;
    height:${size}px;
    animation-duration:${dur}s;
    animation-delay:${delay}s;
    box-shadow: 0 0 ${size*2}px ${size}px rgba(255,255,255,0.6);
    opacity:0;
  `;
  sContainer.appendChild(s);
}

// ── TAROT DATA ──
const CARDS = [
  {name:"바보", emoji:"🌸", num:"0", desc:"새로운 출발"},
  {name:"마법사", emoji:"⚡", num:"I", desc:"의지와 힘"},
  {name:"여사제", emoji:"🌙", num:"II", desc:"직관과 신비"},
  {name:"여황제", emoji:"🌺", num:"III", desc:"풍요와 창조"},
  {name:"황제", emoji:"👑", num:"IV", desc:"질서와 안정"},
  {name:"교황", emoji:"🕊️", num:"V", desc:"지혜와 가르침"},
  {name:"연인", emoji:"💕", num:"VI", desc:"선택과 사랑"},
  {name:"전차", emoji:"🏆", num:"VII", desc:"의지와 승리"},
  {name:"힘", emoji:"🦁", num:"VIII", desc:"내면의 용기"},
  {name:"은둔자", emoji:"🕯️", num:"IX", desc:"성찰과 고독"},
  {name:"운명의 수레바퀴", emoji:"🎡", num:"X", desc:"변화의 흐름"},
  {name:"정의", emoji:"⚖️", num:"XI", desc:"균형과 진실"},
  {name:"매달린 사람", emoji:"🌿", num:"XII", desc:"새로운 시각"},
  {name:"죽음", emoji:"🥀", num:"XIII", desc:"변환과 끝"},
  {name:"절제", emoji:"🌊", num:"XIV", desc:"균형과 조화"},
  {name:"악마", emoji:"🖤", num:"XV", desc:"속박과 욕망"},
  {name:"탑", emoji:"⚡", num:"XVI", desc:"갑작스런 변화"},
  {name:"별", emoji:"⭐", num:"XVII", desc:"희망과 영감"},
  {name:"달", emoji:"🌕", num:"XVIII", desc:"환상과 두려움"},
  {name:"태양", emoji:"☀️", num:"XIX", desc:"기쁨과 성공"},
  {name:"심판", emoji:"🎺", num:"XX", desc:"각성과 부활"},
  {name:"세계", emoji:"🌍", num:"XXI", desc:"완성과 통합"},
];

const SPREAD_CONFIG = {
  1: [{label:"오늘의 메시지"}],
  3: [{label:"과거"},{label:"현재"},{label:"미래"}],
  5: [{label:"현재 상황"},{label:"도전"},{label:"가능성"},{label:"조언"},{label:"결과"}],
};

let selectedSpread = 1;
let drawnCards = [];
let flippedCount = 0;
let readingStarted = false;

function selectSpread(btn) {
  document.querySelectorAll('.spread-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedSpread = parseInt(btn.dataset.spread);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function drawCards() {
  const btn = document.getElementById('drawBtn');
  btn.disabled = true;

  const question = document.getElementById('questionInput').value.trim();
  const config = SPREAD_CONFIG[selectedSpread];
  const shuffled = shuffle(CARDS);
  drawnCards = shuffled.slice(0, selectedSpread).map((card, i) => ({
    ...card,
    reversed: Math.random() > 0.7,
    position: config[i].label
  }));

  flippedCount = 0;
  readingStarted = false;

  const area = document.getElementById('cardsArea');
  area.innerHTML = '';

  const row = document.createElement('div');
  row.className = 'cards-row';

  const labelsRow = document.createElement('div');
  labelsRow.className = 'position-labels';

  drawnCards.forEach((card, i) => {
    const cardEl = document.createElement('div');
    cardEl.className = 'tarot-card';
    cardEl.id = `card-${i}`;
    cardEl.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back">
          <div class="card-back-pattern"></div>
          <div class="card-back-icon">🎀</div>
        </div>
        <div class="card-face card-front" style="${card.reversed ? 'transform:rotateY(180deg) rotate(180deg)' : 'transform:rotateY(180deg)'}">
          <div class="card-number">${card.num}</div>
          <div class="card-emoji">${card.emoji}</div>
          <div class="card-name">${card.name}</div>
          ${card.reversed ? '<div class="card-reversed">역방향</div>' : ''}
        </div>
      </div>
    `;
    cardEl.onclick = () => flipCard(i);
    row.appendChild(cardEl);

    const lbl = document.createElement('div');
    lbl.className = 'pos-label';
    lbl.id = `lbl-${i}`;
    lbl.textContent = card.position;
    labelsRow.appendChild(lbl);

    setTimeout(() => {
      cardEl.classList.add('appear');
      cardEl.style.opacity = '';
    }, i * 160);
  });

  area.appendChild(row);
  area.appendChild(labelsRow);

  document.getElementById('clickHint').style.display = 'block';
  document.getElementById('readingArea').innerHTML = '';
  document.getElementById('resetBtn').style.display = 'none';

  setTimeout(() => {
    document.querySelectorAll('.pos-label').forEach(l => l.classList.add('visible'));
  }, selectedSpread * 160 + 300);
}

function flipCard(idx) {
  if (readingStarted) return;
  const cardEl = document.getElementById(`card-${idx}`);
  if (cardEl.classList.contains('flipped')) return;

  cardEl.classList.add('flipped');
  flippedCount++;

  if (flippedCount === drawnCards.length) {
    readingStarted = true;
    document.getElementById('clickHint').style.display = 'none';
    setTimeout(() => startReading(), 600);
  }
}

async function startReading() {
  const question = document.getElementById('questionInput').value.trim() || '오늘 나에게 필요한 메시지';
  const readingArea = document.getElementById('readingArea');
  readingArea.innerHTML = '';

  // Build card descriptions for prompt
  const cardDescs = drawnCards.map((c,i) =>
    `${c.position}: ${c.name} (${c.reversed ? '역방향' : '정방향'})`
  ).join(', ');

  const prompt = `당신은 직관적이고 따뜻한 타로 리더입니다. 아름답고 시적인 한국어로 타로를 해석해주세요.

질문: "${question}"
뽑은 카드: ${cardDescs}

각 카드 위치마다 2~3문장의 따뜻하고 통찰력 있는 해석을 해주세요. 그리고 마지막에 전체적인 종합 메시지를 3~4문장으로 써주세요.

반드시 아래 JSON 형식으로만 응답하세요. 백틱이나 추가 설명 없이 JSON 텍스트만 출력하세요:
{"cards":[{"position":"위치명","name":"카드이름","reading":"해석 텍스트"}],"overall":"전체 종합 메시지"}`;

  // Show loading cards
  drawnCards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'reading-card';
    div.id = `reading-${i}`;
    div.innerHTML = `
      <div class="reading-card-title">
        <span class="rc-icon">${card.emoji}</span>
        <span class="rc-pos">${card.position}</span>
      </div>
      <div class="rc-name">${card.name}${card.reversed ? ' (역방향)' : ''}</div>
      <div class="rc-text loading">
        <span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
        해석 중이에요…
      </div>
    `;
    readingArea.appendChild(div);
  });

  const overallDiv = document.createElement('div');
  overallDiv.className = 'overall-reading';
  overallDiv.id = 'overall-reading';
  overallDiv.innerHTML = `
    <div class="overall-title">🌙 종합 메시지</div>
    <div class="overall-text loading">
      <span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
      전체 흐름을 읽고 있어요…
    </div>
  `;
  readingArea.appendChild(overallDiv);

  try {
    const response = await fetch('/api/tarot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    const data = await response.json();
    const raw = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json/gi, '').replace(/```/g, '').trim();
    const jsonMatch = clean.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('JSON 없음');
    const result = JSON.parse(jsonMatch[0]);

    // Animate in results
    result.cards.forEach((c, i) => {
      const el = document.getElementById(`reading-${i}`);
      if (!el) return;
      setTimeout(() => {
        el.querySelector('.rc-text').classList.remove('loading');
        el.querySelector('.rc-text').innerHTML = c.reading;
      }, i * 200);
    });

    setTimeout(() => {
      const ov = document.getElementById('overall-reading');
      ov.querySelector('.overall-text').classList.remove('loading');
      ov.querySelector('.overall-text').innerHTML = result.overall;
      document.getElementById('resetBtn').style.display = 'block';
    }, result.cards.length * 200 + 100);

  } catch (err) {
    readingArea.innerHTML = `
      <div class="reading-card">
        <div class="rc-text" style="color:var(--soft)">카드를 읽는 중 문제가 생겼어요. 다시 시도해주세요 🌸</div>
      </div>`;
    document.getElementById('resetBtn').style.display = 'block';
    document.getElementById('drawBtn').disabled = false;
  }
}

function resetAll() {
  document.getElementById('cardsArea').innerHTML = '';
  document.getElementById('readingArea').innerHTML = '';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('clickHint').style.display = 'none';
  document.getElementById('drawBtn').disabled = false;
  drawnCards = [];
  flippedCount = 0;
  readingStarted = false;
}
</script>
</body>
</html>
